<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería Club UG</title>
<link rel="icon" href="https://raw.githubusercontent.com/LUISPLUAAAA/index.html/main/favicon-32x32.png" type="image/png" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
  /* ===== VARIABLES ===== */
  :root {
    --primary: #003366;
    --primary-dark: #002244;
    --primary-light: #1a4d7a;
    --secondary: #0072c6;
    --secondary-light: #4d9fd8;
    --sky-light: #e0f2fe;
    --sky: #b8e2f2;
    --sky-medium: #9cd4e8;
    --white: #ffffff;
    --light: #f5fafe;
    --light-bg: #fafcff;
    --text: #2c3e50;
    --text-light: #5a6e7f;
    --gray-100: #f5f7fa;
    --gray-200: #e9edf2;
    --gray-300: #d4dce6;
    --shadow-sm: 0 4px 12px rgba(0,51,102,0.08);
    --shadow-md: 0 8px 24px rgba(0,51,102,0.12);
    --shadow-lg: 0 16px 32px rgba(0,51,102,0.16);
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    --border-radius: 20px;
    --border-radius-sm: 14px;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 28px;
    color: var(--text);
    position: relative;
    overflow-x: hidden;
  }

  /* Fondo animado con partículas y gradientes en movimiento */
  .animated-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -2;
    background: linear-gradient(135deg, 
      #e0f2fe 0%, 
      #b8e2f2 25%, 
      #9cd4e8 50%, 
      #b8e2f2 75%, 
      #e0f2fe 100%);
    background-size: 200% 200%;
    animation: gradientShift 12s ease infinite;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Partículas flotantes */
  .particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    background: rgba(0,114,198,0.15);
    border-radius: 50%;
    pointer-events: none;
    animation: floatParticle linear infinite;
  }

  @keyframes floatParticle {
    0% {
      transform: translateY(100vh) rotate(0deg);
      opacity: 0;
    }
    10% {
      opacity: 0.5;
    }
    90% {
      opacity: 0.5;
    }
    100% {
      transform: translateY(-20vh) rotate(360deg);
      opacity: 0;
    }
  }

  /* Ondas suaves */
  .waves {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 200px;
    z-index: -1;
    pointer-events: none;
  }

  .wave {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(0,114,198,0.1)" fill-opacity="1" d="M0,192L48,197.3C96,203,192,213,288,208C384,203,480,181,576,181.3C672,181,768,203,864,213.3C960,224,1056,224,1152,208C1248,192,1344,160,1392,144L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') repeat-x;
    background-size: cover;
    animation: waveMove 20s linear infinite;
    opacity: 0.4;
  }

  .wave:nth-child(2) {
    bottom: -20px;
    opacity: 0.3;
    animation: waveMove 15s linear infinite reverse;
    background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(0,51,102,0.1)" fill-opacity="1" d="M0,256L48,245.3C96,235,192,213,288,208C384,203,480,213,576,224C672,235,768,245,864,234.7C960,224,1056,192,1152,176C1248,160,1344,160,1392,160L1440,160L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') repeat-x;
    background-size: cover;
  }

  .wave:nth-child(3) {
    bottom: -40px;
    opacity: 0.2;
    animation: waveMove 25s linear infinite;
  }

  @keyframes waveMove {
    0% { background-position-x: 0; }
    100% { background-position-x: 1440px; }
  }

  /* Círculos decorativos flotantes */
  .floating-circles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
  }

  .circle {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,114,198,0.08) 0%, rgba(0,51,102,0.04) 100%);
    animation: floatCircle 8s ease-in-out infinite;
  }

  @keyframes floatCircle {
    0%, 100% {
      transform: translateY(0) translateX(0) scale(1);
    }
    50% {
      transform: translateY(-30px) translateX(20px) scale(1.05);
    }
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* Botón de regreso con efecto glass */
  .back-button {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 100;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 24px;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(0,114,198,0.2);
    border-radius: 50px;
    color: var(--primary);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    text-decoration: none;
    box-shadow: var(--shadow-sm);
  }

  .back-button i {
    color: var(--secondary);
    font-size: 1rem;
    transition: var(--transition);
  }

  .back-button:hover {
    transform: translateX(-5px);
    box-shadow: var(--shadow-md);
    border-color: var(--secondary);
    background: var(--white);
  }

  .back-button:hover i {
    transform: translateX(-3px);
  }

  /* Header con efecto glass */
  .header-section {
    text-align: center;
    margin-bottom: 30px;
  }

  h1 {
    font-size: clamp(2rem, 6vw, 2.8rem);
    font-weight: 800;
    color: var(--primary);
    letter-spacing: -0.5px;
    position: relative;
    display: inline-block;
    margin-bottom: 20px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  h1::after {
    content: '';
    position: absolute;
    bottom: -12px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 4px;
    background: linear-gradient(90deg, var(--secondary), var(--sky-medium));
    border-radius: 2px;
  }

  /* Contador de imágenes con efecto glass */
  .stats-bar {
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
    padding: 12px 24px;
    border-radius: 50px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow-sm);
    border: 1px solid rgba(0,114,198,0.2);
    margin-top: 20px;
  }

  .stats-bar i {
    color: var(--secondary);
    font-size: 1.2rem;
  }

  .stats-bar span {
    font-weight: 600;
    color: var(--primary);
  }

  /* Caja de subida con efecto glass mejorado */
  .upload-box {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(0,114,198,0.2);
    border-radius: var(--border-radius);
    padding: 28px;
    margin: 20px auto 40px;
    max-width: 600px;
    box-shadow: var(--shadow-sm);
    transition: var(--transition);
  }

  .upload-box:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-2px);
    border-color: rgba(0,114,198,0.3);
  }

  /* Vista previa de imagen */
  .preview-container {
    margin-bottom: 20px;
    text-align: center;
    display: none;
  }

  .preview-image {
    max-width: 100%;
    max-height: 200px;
    border-radius: var(--border-radius-sm);
    border: 2px solid var(--secondary);
    box-shadow: var(--shadow-sm);
    object-fit: cover;
  }

  .file-input-wrapper {
    position: relative;
    margin-bottom: 20px;
  }

  .file-input-wrapper input[type="file"] {
    position: absolute;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
  }

  .file-label {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: rgba(255,255,255,0.9);
    color: var(--text);
    padding: 14px 20px;
    border-radius: 50px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    border: 1px solid rgba(0,114,198,0.2);
  }

  .file-label:hover {
    background: var(--white);
    transform: translateY(-2px);
    border-color: var(--secondary);
  }

  .file-label i {
    color: var(--secondary);
    font-size: 1.2rem;
  }

  .file-name {
    color: var(--text-light);
    margin-top: 8px;
    font-size: 0.85rem;
    text-align: center;
  }

  .text-input-wrapper {
    position: relative;
    margin-bottom: 20px;
  }

  .text-input-wrapper i {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--secondary);
    font-size: 1rem;
    z-index: 1;
  }

  input[type="text"] {
    width: 100%;
    padding: 14px 20px 14px 48px;
    background: rgba(255,255,255,0.9);
    border: 1px solid rgba(0,114,198,0.2);
    border-radius: 50px;
    color: var(--text);
    font-size: 0.95rem;
    font-family: 'Inter', sans-serif;
    transition: var(--transition);
  }

  input[type="text"]:focus {
    outline: none;
    border-color: var(--secondary);
    background: var(--white);
    box-shadow: 0 0 0 3px rgba(0,114,198,0.1);
  }

  /* Barra de progreso */
  .progress-bar {
    width: 100%;
    height: 4px;
    background: rgba(0,0,0,0.1);
    border-radius: 4px;
    overflow: hidden;
    margin-top: 15px;
    display: none;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    width: 0%;
    transition: width 0.3s ease;
    border-radius: 4px;
  }

  button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border: none;
    border-radius: 50px;
    color: var(--white);
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-family: 'Inter', sans-serif;
  }

  button:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }

  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .status {
    margin-top: 20px;
    padding: 12px 16px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    border-radius: 50px;
    color: var(--text-light);
    text-align: center;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border: 1px solid rgba(0,114,198,0.2);
  }

  /* Skeleton loading */
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 28px;
    padding: 20px 0;
  }

  .skeleton-card {
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
    border-radius: var(--border-radius);
    overflow: hidden;
    border: 1px solid rgba(0,114,198,0.2);
    animation: pulse 1.5s ease-in-out infinite;
  }

  .skeleton-image {
    width: 100%;
    aspect-ratio: 1/1;
    background: linear-gradient(90deg, rgba(0,114,198,0.1) 25%, rgba(0,114,198,0.2) 50%, rgba(0,114,198,0.1) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }

  .skeleton-text {
    height: 60px;
    background: linear-gradient(90deg, rgba(0,114,198,0.1) 25%, rgba(0,114,198,0.2) 50%, rgba(0,114,198,0.1) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    margin: 16px;
    border-radius: 8px;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  /* Tarjeta de imagen con efecto glass */
  .card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    border-radius: var(--border-radius);
    overflow: hidden;
    transition: var(--transition);
    animation: cardAppear 0.5s ease-out forwards;
    opacity: 0;
    cursor: pointer;
    border: 1px solid rgba(0,114,198,0.2);
    box-shadow: var(--shadow-sm);
    position: relative;
  }

  @keyframes cardAppear {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card:hover {
    transform: translateY(-8px);
    box-shadow: var(--shadow-lg);
    border-color: rgba(0,114,198,0.4);
    background: rgba(255,255,255,0.95);
  }

  .card-image-wrapper {
    position: relative;
    overflow: hidden;
    aspect-ratio: 1/1;
  }

  .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: var(--transition);
  }

  .card:hover img {
    transform: scale(1.05);
  }

  .card-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,51,102,0.6);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: var(--transition);
  }

  .card:hover .card-overlay {
    opacity: 1;
  }

  .card-overlay i {
    color: white;
    font-size: 2.5rem;
    transform: scale(0.8);
    transition: var(--transition);
  }

  .card:hover .card-overlay i {
    transform: scale(1);
  }

  .card-content {
    padding: 16px;
    border-top: 1px solid rgba(0,114,198,0.2);
  }

  .card-content p {
    color: var(--text);
    font-size: 0.9rem;
    line-height: 1.5;
    font-weight: 500;
  }

  /* Modal */
  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.92);
    backdrop-filter: blur(8px);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    animation: modalFade 0.3s;
  }

  @keyframes modalFade {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal-content {
    position: relative;
    max-width: 90vw;
    max-height: 90vh;
    animation: modalZoom 0.3s;
  }

  @keyframes modalZoom {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .modal-content img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: var(--border-radius);
    border: 3px solid var(--secondary);
    box-shadow: var(--shadow-lg);
  }

  .close-modal {
    position: absolute;
    top: -50px;
    right: 0;
    width: 44px;
    height: 44px;
    background: var(--secondary);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--white);
    font-size: 1.3rem;
    cursor: pointer;
    transition: var(--transition);
    border: 2px solid var(--white);
  }

  .close-modal:hover {
    transform: rotate(90deg) scale(1.1);
    background: var(--primary);
  }

  .loading {
    text-align: center;
    padding: 50px;
    color: var(--text-light);
    font-size: 1rem;
    grid-column: 1 / -1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .loading i {
    font-size: 2rem;
    color: var(--secondary);
  }

  /* Responsive */
  @media (max-width: 768px) {
    body {
      padding: 16px;
    }

    .back-button {
      top: 16px;
      left: 16px;
      padding: 10px 18px;
      font-size: 0.85rem;
    }
    
    .gallery {
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .close-modal {
      top: -40px;
      width: 38px;
      height: 38px;
      font-size: 1.1rem;
    }

    .upload-box {
      padding: 20px;
    }
  }

  @media (max-width: 480px) {
    .gallery {
      grid-template-columns: 1fr;
    }

    h1 {
      font-size: 1.8rem;
    }
  }
</style>
</head>

      particle.style.animationDuration = Math.random() * 10 + 8 + 's';
      particle.style.animationDelay = Math.random() * 10 + 's';
      particlesContainer.appendChild(particle);
    }
  }

  // Crear círculos flotantes
  function createCircles() {
    const circlesContainer = document.getElementById('circles');
    const sizes = [150, 200, 250, 300, 350];
    for (let i = 0; i < 8; i++) {
      const circle = document.createElement('div');
      circle.className = 'circle';
      const size = sizes[Math.floor(Math.random() * sizes.length)];
      circle.style.width = size + 'px';
      circle.style.height = size + 'px';
      circle.style.left = Math.random() * 100 + '%';
      circle.style.top = Math.random() * 100 + '%';
      circle.style.animationDuration = Math.random() * 6 + 4 + 's';
      circle.style.animationDelay = Math.random() * 5 + 's';
      circlesContainer.appendChild(circle);
    }
  }

  // Vista previa de imagen
  fileInput.addEventListener('change', function(e) {
    if (this.files[0]) {
      const file = this.files[0];
      fileName.textContent = file.name;
      fileLabelText.textContent = 'Cambiar imagen';
      
      const reader = new FileReader();
      reader.onload = function(e) {
        previewImage.src = e.target.result;
        previewContainer.style.display = 'block';
      };
      reader.readAsDataURL(file);
    } else {
      fileName.textContent = '';
      fileLabelText.textContent = 'Seleccionar imagen';
      previewContainer.style.display = 'none';
      previewImage.src = '';
    }
  });

  // Funciones del modal
  window.openModal = function(src) {
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImage');
    modal.style.display = 'flex';
    modalImg.src = src;
    document.body.style.overflow = 'hidden';
  }

  window.closeModal = function() {
    const modal = document.getElementById('imageModal');
    modal.style.display = 'none';
    document.body.style.overflow = 'auto';
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });

  // Mostrar skeleton loading
  function showSkeletonLoading() {
    galleryDiv.innerHTML = '';
    for (let i = 0; i < 6; i++) {
      const skeleton = document.createElement('div');
      skeleton.className = 'skeleton-card';
      skeleton.innerHTML = `
        <div class="skeleton-image"></div>
        <div class="skeleton-text"></div>
      `;
      galleryDiv.appendChild(skeleton);
    }
  }

  // Login anónimo
  async function loginAnon() {
    try {
      const { data, error } = await supabase.auth.signInAnonymously()
      
      if (error) {
        statusDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Error: ${error.message}`;
        uploadBtn.disabled = true;
        return false;
      }
      
      currentUser = data.user;
      statusDiv.innerHTML = `<i class="fas fa-check-circle"></i> Conectado`;
      uploadBtn.disabled = false;
      return true;
      
    } catch (err) {
      statusDiv.innerHTML = `<i class="fas fa-exclamation-circle"></i> Error de conexión`;
      uploadBtn.disabled = true;
      return false;
    }
  }

  // Subir imagen
  async function uploadImage() {
    if (!currentUser) { 
      statusDiv.innerHTML = `<i class="fas fa-lock"></i> Conectando...`;
      return; 
    }

    const file = fileInput.files[0];
    const text = textInput.value;

    if (!file) { 
      statusDiv.innerHTML = `<i class="fas fa-image"></i> Selecciona una imagen`;
      return; 
    }

    if (!file.type.startsWith('image/')) {
      statusDiv.innerHTML = `<i class="fas fa-ban"></i> Solo imágenes`;
      return;
    }

    if (file.size > 5 * 1024 * 1024) {
      statusDiv.innerHTML = `<i class="fas fa-weight-hanging"></i> Máximo 5MB`;
      return;
    }

    const fileName_ = Date.now() + "-" + file.name.replace(/[^a-zA-Z0-9.-]/g, '_');
    
    uploadBtn.disabled = true;
    statusDiv.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Subiendo...`;
    progressBar.style.display = 'block';
    progressFill.style.width = '0%';

    try {
      let progress = 0;
      const interval = setInterval(() => {
        progress += 10;
        if (progress <= 90) {
          progressFill.style.width = progress + '%';
        }
      }, 200);

      const { error: uploadError } = await supabase.storage
        .from("images")
        .upload(fileName_, file)

      clearInterval(interval);
      
      if (uploadError) throw new Error(uploadError.message);
      
      progressFill.style.width = '100%';

      const { data } = supabase.storage
        .from("images")
        .getPublicUrl(fileName_)

      const { error: insertError } = await supabase.from("photos").insert([
        {
          image_url: data.publicUrl,
          text: text || "📸 Imagen en Galería UG",
          user_id: currentUser.id
        }
      ])

      if (insertError) throw new Error(insertError.message);

      fileInput.value = "";
      textInput.value = "";
      fileName.textContent = '';
      fileLabelText.textContent = 'Seleccionar imagen';
      previewContainer.style.display = 'none';
      previewImage.src = '';
      
      statusDiv.innerHTML = `<i class="fas fa-check-circle"></i> ¡Publicado!`;
      
      await loadImages();
      
      setTimeout(() => {
        statusDiv.innerHTML = `<i class="fas fa-check-circle"></i> Conectado`;
        progressBar.style.display = 'none';
        progressFill.style.width = '0%';
      }, 2000);
      
    } catch (error) {
      statusDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Error: ${error.message}`;
      progressBar.style.display = 'none';
    } finally {
      uploadBtn.disabled = false;
    }
  }

  // Cargar imágenes
  async function loadImages() {
    showSkeletonLoading();
    
    try {
      const { data, error } = await supabase
        .from("photos")
        .select("*")
        .order("created_at", { ascending: false })

      if (error) throw error;

      allPhotos = data || [];
      
      imageCountSpan.textContent = allPhotos.length;

      if (!allPhotos.length) {
        galleryDiv.innerHTML = `
          <div class="loading">
            <i class="fas fa-images"></i>
            <span>No hay imágenes. ¡Sube la primera!</span>
          </div>
        `;
        return;
      }

      galleryDiv.innerHTML = "";

      allPhotos.forEach(photo => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="card-image-wrapper">
            <img src="${photo.image_url}" loading="lazy" alt="Imagen de galería">
            <div class="card-overlay" onclick="openModal('${photo.image_url}')">
              <i class="fas fa-search-plus"></i>
            </div>
          </div>
          <div class="card-content">
            <p><i class="fas fa-camera" style="color: var(--secondary); margin-right: 8px;"></i> ${escapeHtml(photo.text || "📸 Imagen en Galería UG")}</p>
          </div>
        `;
        galleryDiv.appendChild(card);
      });
      
    } catch (error) {
      console.error("Error loading images:", error);
      galleryDiv.innerHTML = `
        <div class="loading">
          <i class="fas fa-exclamation-triangle"></i>
          <span>Error al cargar imágenes</span>
        </div>
      `;
    }
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  uploadBtn.addEventListener("click", uploadImage);
  uploadBtn.disabled = true;

  async function init() {
    createParticles();
    createCircles();
    const loggedIn = await loginAnon();
    if (loggedIn) {
      await loadImages();
    }
  }

  init();
</script>
</body>
</html>
