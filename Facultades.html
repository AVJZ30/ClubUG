  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ===== VARIABLES ===== */
    :root {
      --primary: #003366;
      --primary-dark: #002244;
      --primary-light: #1a4d7a;
      --secondary: #0072c6;
      --secondary-light: #4d9fd8;
      --sky-light: #e0f2fe;
      --sky: #b8e2f2;
      --sky-medium: #9cd4e8;
      --sky-muted: #7fc1d4;
      --white: #ffffff;
      --light: #f5fafe;
      --light-bg: #fafcff;
      --text: #2c3e50;
      --text-light: #5a6e7f;
      --gray-100: #f5f7fa;
      --gray-200: #e9edf2;
      --gray-300: #d4dce6;
      --shadow-sm: 0 4px 12px rgba(0,51,102,0.08);
      --shadow-md: 0 8px 24px rgba(0,51,102,0.12);
      --shadow-lg: 0 16px 32px rgba(0,51,102,0.16);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --border-radius: 20px;
      --border-radius-sm: 14px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--light-bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar {
      width: 10px;
    }
    ::-webkit-scrollbar-track {
      background: var(--gray-200);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 10px;
    }

    /* ===== HEADER ===== */
    .header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: var(--white);
      padding: 4rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(184,226,242,0.2) 0%, transparent 70%);
      border-radius: 50%;
      animation: rotate 20s linear infinite;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: -50%;
      left: -50%;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      border-radius: 50%;
      animation: rotateReverse 25s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes rotateReverse {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }

    .title {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      margin-bottom: 0.75rem;
      position: relative;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 1.1rem;
      font-weight: 400;
      max-width: 600px;
      margin: 0 auto;
      opacity: 0.9;
      position: relative;
    }

    .header-buttons {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 2rem 0 0;
      position: relative;
      z-index: 2;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 28px;
      border-radius: 50px;
      font-weight: 600;
      text-decoration: none;
      transition: var(--transition);
      font-size: 0.95rem;
      cursor: pointer;
      border: none;
      font-family: 'Inter', sans-serif;
    }

    .btn-back {
      background: rgba(255,255,255,0.2);
      color: var(--white);
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255,255,255,0.3);
    }

    .btn-back:hover {
      background: rgba(255,255,255,0.3);
      transform: translateY(-3px);
    }

    .btn-blocks {
      background: var(--sky);
      color: var(--primary);
      border: none;
    }

    .btn-blocks:hover {
      background: var(--white);
      transform: translateY(-3px);
      box-shadow: var(--shadow-sm);
    }

    /* ===== GRID DE FACULTADES ===== */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
      padding: 3rem 1.5rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      background: var(--white);
      border-radius: var(--border-radius);
      overflow: hidden;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: var(--shadow-sm);
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--gray-200);
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: var(--shadow-lg);
      border-color: var(--sky-medium);
    }

    .card-image {
      height: 200px;
      width: 100%;
      object-fit: cover;
      transition: var(--transition);
    }

    .card:hover .card-image {
      transform: scale(1.05);
    }

    .card-content {
      padding: 1.5rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .card h2 {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 0.75rem;
      line-height: 1.3;
    }

    .card p {
      color: var(--text-light);
      font-size: 0.9rem;
      margin-bottom: 1rem;
      flex-grow: 1;
      line-height: 1.6;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      padding-top: 1rem;
      border-top: 1px solid var(--gray-200);
    }

    .card-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-weight: 700;
      font-size: 1.1rem;
    }

    .card-link {
      color: var(--secondary);
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: var(--transition);
    }

    .card-link:hover {
      color: var(--primary);
      gap: 10px;
    }

    /* ===== MODAL CON SCROLL ===== */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.8);
      backdrop-filter: blur(5px);
      animation: fadeIn 0.3s;
      overflow-y: auto;
    }

    .modal-content {
      background-color: var(--white);
      margin: 3% auto;
      border-radius: var(--border-radius);
      width: 90%;
      max-width: 900px;
      position: relative;
      animation: slideIn 0.3s;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
    }

    .modal-header {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: var(--white);
      padding: 2rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .modal-header h2 {
      font-size: 1.8rem;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.5px;
      padding-right: 2rem;
    }

    .modal-body {
      padding: 2rem;
      overflow-y: auto;
      flex: 1;
    }

    .modal-image {
      width: 100%;
      height: 250px;
      object-fit: cover;
      border-radius: var(--border-radius-sm);
      box-shadow: var(--shadow-sm);
      margin-bottom: 1.5rem;
    }

    .modal-description {
      color: var(--text-light);
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }

    .modal-features {
      list-style: none;
      margin-bottom: 2rem;
    }

    .modal-features li {
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
    }

    .modal-features li::before {
      content: "✓";
      color: var(--secondary);
      font-weight: bold;
      font-size: 1.1rem;
    }

    .modal-actions {
      margin-top: 1rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: var(--white);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      transition: var(--transition);
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
    }

    .close {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--white);
      cursor: pointer;
      background: rgba(255,255,255,0.2);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      z-index: 20;
    }

    .close:hover {
      background: rgba(255,255,255,0.3);
      transform: rotate(90deg);
    }

    /* ===== ANIMACIONES ===== */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideIn {
      from {
        transform: translateY(-50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1.5rem;
        padding: 2rem 1rem;
      }
      
      .modal-content {
        margin: 5% auto;
        width: 95%;
        max-height: 85vh;
      }
      
      .modal-header {
        padding: 1.5rem;
      }
      
      .modal-header h2 {
        font-size: 1.5rem;
      }
      
      .modal-body {
        padding: 1.5rem;
      }
      
      .modal-image {
        height: 200px;
      }
      
      .btn-primary {
        width: 100%;
        justify-content: center;
      }
      
      .header-buttons {
        flex-direction: column;
        align-items: center;
      }
      
      .btn {
        width: 200px;
        justify-content: center;
      }
    }

    @media (max-width: 480px) {
      .grid {
        grid-template-columns: 1fr;
      }
      
      .header {
        padding: 2rem 1rem;
      }
      
      .title {
        font-size: 1.8rem;
      }
      
      .modal-header h2 {
        font-size: 1.3rem;
      }
      
      .modal-body {
        padding: 1rem;
      }
    }
  </style>
</head>

    // Elementos DOM
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modal-title');
    const modalImg = document.getElementById('modal-img');
    const modalDescription = document.getElementById('modal-description');
    const modalFeatures = document.getElementById('modal-features');
    const modalMap = document.getElementById('modal-map');
    const closeBtn = document.getElementById('close');
    const facultiesGrid = document.getElementById('faculties-grid');

    // Generar tarjetas de facultades
    function renderFaculties() {
      facultiesGrid.innerHTML = '';
      
      facultiesData.forEach((faculty, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.setAttribute('role', 'button');
        card.setAttribute('aria-label', `Ver información de ${faculty.title}`);
        card.setAttribute('tabindex', '0');
        
        card.innerHTML = `
          <img src="${faculty.img}" alt="${faculty.title}" class="card-image" loading="lazy">
          <div class="card-content">
            <h2>${faculty.title}</h2>
            <p>${faculty.description.substring(0, 100)}...</p>
            <div class="card-footer">
              <div class="card-icon">${index + 1}</div>
              <a href="#" class="card-link">Ver más <i class="fas fa-arrow-right"></i></a>
            </div>
          </div>
        `;
        
        facultiesGrid.appendChild(card);
        
        // Eventos para abrir modal
        card.addEventListener('click', (e) => {
          e.preventDefault();
          openModal(faculty);
        });
        card.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            openModal(faculty);
          }
        });
        
        // Prevenir que el enlace "Ver más" propague el evento
        const cardLink = card.querySelector('.card-link');
        cardLink.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          openModal(faculty);
        });
      });
    }

    // Abrir modal con información de la facultad
    function openModal(faculty) {
      modalTitle.textContent = faculty.title;
      modalImg.src = faculty.img;
      modalImg.alt = `Imagen de la facultad de ${faculty.title}`;
      modalDescription.textContent = faculty.description;
      modalMap.href = faculty.map;
      
      // Limpiar y llenar características
      modalFeatures.innerHTML = '';
      faculty.features.forEach(feature => {
        const li = document.createElement('li');
        li.textContent = feature;
        modalFeatures.appendChild(li);
      });
      
      modal.style.display = 'block';
      document.body.style.overflow = 'hidden';
    }

    // Cerrar modal
    function closeModal() {
      modal.style.display = 'none';
      document.body.style.overflow = 'auto';
    }

    // Event listeners
    closeBtn.addEventListener('click', closeModal);
    
    // Cerrar con tecla Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modal.style.display === 'block') {
        closeModal();
      }
    });
    
    // Cerrar al hacer clic fuera del contenido
    window.addEventListener('click', (e) => {
      if (e.target === modal) {
        closeModal();
      }
    });

    // Inicializar
    document.addEventListener('DOMContentLoaded', () => {
      renderFaculties();
    });
  </script>
